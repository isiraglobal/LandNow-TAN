<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>TAN | Transaction Action Network</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
    }
    #intro-video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
    #loader {
      position: fixed;
      inset: 0;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 0.6s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loader-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
<div id="splash">
  <video id="intro-video" autoplay muted playsinline
    src="Earth Zoom In Realistic Clouds With Alpha Matte_1080p.mp4">
  </video>
</div>
<div id="loader">
  <span id="loader-text">Loading</span>
</div>

<script>
  (function() {
    const video = document.getElementById('intro-video');
    const loader = document.getElementById('loader');

    function goToOnboard() {
      sessionStorage.setItem('tan_intro_played', '1');
      window.location.replace('onboard.html');
    }

    if (sessionStorage.getItem('tan_intro_played')) {
      goToOnboard();
      return;
    }

    video.playbackRate = 1.3;

    video.addEventListener('ended', goToOnboard);

    setTimeout(() => {
      loader.classList.add('hidden');
    }, 2000);

    setTimeout(() => {
      video.play();
    }, 300);
  })();
</script>
</body>
</html>
