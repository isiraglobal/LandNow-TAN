<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>TAN | Transaction Action Network</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #intro-video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 0;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
    }
    #skip-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 1001;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      display: none;
    }
    #skip-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
<div id="splash">
  <video id="intro-video" muted playsinline preload="auto" style="display:none">
    <source src="Earth Zoom In Realistic Clouds With Alpha Matte_1080p.mp4" type="video/mp4">
  </video>
  <div id="loader">
    <div class="spinner"></div>
    <span id="loader-text">Buffering</span>
  </div>
</div>
<button id="skip-btn">Skip</button>

<script>
  (function() {
    const video = document.getElementById('intro-video');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');
    const skipBtn = document.getElementById('skip-btn');

    function goToOnboard() {
      sessionStorage.setItem('tan_intro_played', '1');
      window.location.replace('onboard.html');
    }

    if (sessionStorage.getItem('tan_intro_played')) {
      goToOnboard();
      return;
    }

    function showAndPlay() {
      loader.style.display = 'none';
      video.style.display = 'block';
      video.playbackRate = 1.3;
      video.play().catch(goToOnboard);
      skipBtn.style.display = 'block';
    }

    video.addEventListener('canplaythrough', showAndPlay, { once: true });

    video.addEventListener('ended', goToOnboard);

    setTimeout(() => {
      if (video.style.display === 'none') showAndPlay();
    }, 8000);

    skipBtn.addEventListener('click', goToOnboard);
  })();
</script>
</body>
</html>
